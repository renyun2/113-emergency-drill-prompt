services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: edrill
      POSTGRES_PASSWORD: edrill
      POSTGRES_DB: emergency_drill
    volumes:
      - edrill_pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edrill -d emergency_drill"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 12s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_DSN: "host=db user=edrill password=edrill dbname=emergency_drill port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      GIN_MODE: release
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${EMERGENCY_DRILL_WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  edrill_pg_data:
